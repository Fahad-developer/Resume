<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Muneeba 💕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF6F2;
    --rose:#C9184A;
    --soft-pink:#FFC2D1;
    --blush:#FFE3E9;
    --gold:#D4A373;
    --maroon:#5C1A2B;
    --white:#FFFFFF;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    background:
      radial-gradient(circle at 15% 20%, var(--blush) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, var(--soft-pink) 0%, transparent 50%),
      var(--cream);
    color:var(--maroon);
    font-family:'Quicksand', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
  }

  /* Floating ambient hearts */
  .heart-field{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:1;
    overflow:hidden;
  }
  .heart-field span{
    position:absolute;
    bottom:-10%;
    font-size:1.4rem;
    opacity:0.55;
    animation:float-up linear infinite;
    color:var(--rose);
  }
  @keyframes float-up{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.6; }
    90%{ opacity:0.5; }
    100%{ transform:translateY(-115vh) translateX(var(--drift,20px)) rotate(25deg); opacity:0; }
  }

  main{
    position:relative;
    z-index:2;
    max-width:680px;
    margin:0 auto;
    padding:6vh 1.5rem 8vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .eyebrow{
    font-family:'Caveat', cursive;
    font-size:1.6rem;
    color:var(--rose);
    letter-spacing:0.5px;
    margin-bottom:0.2rem;
  }

  h1{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:700;
    font-size:clamp(2.6rem, 8vw, 4.2rem);
    color:var(--maroon);
    line-height:1.05;
    margin-bottom:0.6rem;
  }
  h1 .name{
    color:var(--rose);
    font-style:normal;
  }

  .subtitle{
    font-size:1.05rem;
    color:#7a3b48;
    max-width:480px;
    margin-bottom:3rem;
    line-height:1.6;
  }

  /* Photo frame with heartbeat glow */
  .frame-wrap{
    position:relative;
    width:min(78vw, 300px);
    height:min(78vw, 300px);
    margin-bottom:2.6rem;
  }
  .glow{
    position:absolute;
    inset:-14px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(201,24,74,0.35), transparent 70%);
    animation:heartbeat 2.4s ease-in-out infinite;
    z-index:0;
  }
  @keyframes heartbeat{
    0%, 100%{ transform:scale(1); opacity:0.55; }
    50%{ transform:scale(1.12); opacity:0.85; }
  }
  .photo-frame{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
    border:6px solid var(--white);
    box-shadow:0 18px 40px rgba(92,26,43,0.25), 0 0 0 3px var(--soft-pink);
    overflow:hidden;
    z-index:1;
    background:var(--white) center/cover no-repeat;
  }
  .photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .frame-decor{
    position:absolute;
    z-index:2;
    font-size:1.6rem;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.12));
  }
  .frame-decor.tl{ top:-6px; left:6%; }
  .frame-decor.br{ bottom:-2px; right:4%; }

  /* Cycling love note */
  .note-box{
    min-height:3.4rem;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:2.2rem;
  }
  #note{
    font-family:'Caveat', cursive;
    font-size:clamp(1.5rem, 4vw, 2rem);
    color:var(--rose);
    transition:opacity 0.5s ease;
  }

  /* Kiss button */
  .kiss-btn{
    font-family:'Quicksand', sans-serif;
    font-weight:600;
    font-size:1rem;
    color:var(--white);
    background:linear-gradient(135deg, var(--rose), #E85D75);
    border:none;
    padding:0.95rem 2.2rem;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(201,24,74,0.35);
    transition:transform 0.2s ease, box-shadow 0.2s ease;
    letter-spacing:0.3px;
  }
  .kiss-btn:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 14px 30px rgba(201,24,74,0.45);
  }
  .kiss-btn:focus-visible{
    outline:3px solid var(--gold);
    outline-offset:3px;
  }
  .kiss-btn:active{ transform:translateY(0) scale(0.98); }

  .signature{
    margin-top:3.2rem;
    font-family:'Caveat', cursive;
    font-size:1.4rem;
    color:#7a3b48;
  }
  .signature b{
    color:var(--rose);
    font-size:1.6rem;
  }

  /* Falling kisses overlay */
  .kiss-burst{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:50;
    overflow:hidden;
  }
  .kiss-burst span{
    position:absolute;
    top:-8%;
    font-size:1.8rem;
    animation:kiss-fall linear forwards;
  }
  @keyframes kiss-fall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(112vh) rotate(40deg); opacity:0.9; }
  }

  footer{
    position:relative;
    z-index:2;
    text-align:center;
    padding-bottom:2.5rem;
    font-size:0.8rem;
    color:#b97384;
  }

  @media (max-width:420px){
    .subtitle{ margin-bottom:2.2rem; }
    .frame-wrap{ margin-bottom:2rem; }
  }
</style>
</head>
<body>

<div class="heart-field" id="heartField" aria-hidden="true"></div>

<main>
  <p class="eyebrow">a little something for</p>
  <h1>My <span class="name">Muneeba</span> 💕</h1>
  <p class="subtitle">Every page needs a home, and every home needs a heart — this one's yours, filled with all the kisses and hugs I never say enough.</p>

  <div class="frame-wrap">
    <div class="glow"></div>
    <div class="photo-frame">
      <img src="love.png" alt="A photo of Muneeba" loading="lazy">
    </div>
    <span class="frame-decor tl">💖</span>
    <span class="frame-decor br">😘</span>
  </div>

  <div class="note-box">
    <p id="note">I love you more than words on a screen can ever show 🥰</p>
  </div>

  <button class="kiss-btn" id="kissBtn" aria-label="Send a shower of kisses">Send me a kiss 💋</button>

  <p class="signature">with all my heart,<br><b>your Fahad</b> 🤍</p>
</main>

<div class="kiss-burst" id="kissBurst" aria-hidden="true"></div>

<footer>made with 💗 for the love of my life</footer>

<script>
  // Ambient floating hearts
  const heartField = document.getElementById('heartField');
  const heartEmojis = ['❤️','💕','💗','💞','💓'];
  const totalHearts = 16;

  for (let i = 0; i < totalHearts; i++) {
    const span = document.createElement('span');
    span.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    const left = Math.random() * 100;
    const duration = 9 + Math.random() * 10;
    const delay = Math.random() * 12;
    const drift = (Math.random() * 80 - 40) + 'px';
    const size = 1 + Math.random() * 1.2;
    span.style.left = left + 'vw';
    span.style.animationDuration = duration + 's';
    span.style.animationDelay = delay + 's';
    span.style.setProperty('--drift', drift);
    span.style.fontSize = size + 'rem';
    heartField.appendChild(span);
  }

  // Cycling love notes
  const notes = [
    "I love you more than words on a screen can ever show 🥰",
    "Every single day with you feels like a soft, warm hug 🤗",
    "You're my favorite hello and my hardest goodbye 💖",
    "A thousand kisses still wouldn't be enough for you 😘",
    "Home isn't a place, it's wherever you are 🏡💕",
    "You + me = the best story I never want to end ✨"
  ];
  let noteIndex = 0;
  const noteEl = document.getElementById('note');

  setInterval(() => {
    noteIndex = (noteIndex + 1) % notes.length;
    noteEl.style.opacity = 0;
    setTimeout(() => {
      noteEl.textContent = notes[noteIndex];
      noteEl.style.opacity = 1;
    }, 500);
  }, 3800);

  // Kiss burst on button click
  const kissBtn = document.getElementById('kissBtn');
  const kissBurst = document.getElementById('kissBurst');
  const kissEmojis = ['💋','😘','💕','❤️'];

  kissBtn.addEventListener('click', () => {
    const count = 22;
    for (let i = 0; i < count; i++) {
      const span = document.createElement('span');
      span.textContent = kissEmojis[Math.floor(Math.random() * kissEmojis.length)];
      span.style.left = (Math.random() * 100) + 'vw';
      span.style.animationDuration = (2.2 + Math.random() * 1.6) + 's';
      span.style.fontSize = (1.3 + Math.random() * 1.4) + 'rem';
      kissBurst.appendChild(span);
      setTimeout(() => span.remove(), 4200);
    }
  });
</script>

</body>
</html>
